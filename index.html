<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container-card">
        <picture>
            <source srcset="./assets/image-product-desktop.jpg" media="(min-width: 800px)">
            <img src="./assets/image-product-mobile.jpg" alt="image-product-mobile">
        </picture>
        <div class="text-container">
            <p class="perfume">PERFUME</p>
            <h1>Gabrielle Essence Eau De Parfum</h1>
            <p class="text-parrafo">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
            <div class="container-price">
                <span class="price-green">$149.99</span>
                <span class="price-grey">$169.99</span>
            </div>
            <button>
                <img src="./assets/icon-cart.svg" alt="icon-card">
                <p>Add to Cart</p>
            </button>
        </div>
    </main>
</body>
</html>
